<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn-ify — English to LinkedIn-Speak Translator</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --blue: #0a66c2;
            --blue-hover: #004182;
            --blue-soft: #e8f1fb;
            --blue-border: #c7dcf2;
            --page: #f3f7fb;
            --card: #ffffff;
            --border: #d6e0ea;
            --text: #1d2226;
            --text-muted: #5b6b7b;
            --text-dim: #8a97a3;
            --red: #c0392b;
            --green: #1f8a4c;
            --font: -apple-system, "Segoe UI", BlinkMacSystemFont, Roboto, sans-serif;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(10, 102, 194, 0.06), 0 6px 24px rgba(10, 102, 194, 0.06);
        }

        html { font-size: 16px; }

        body {
            font-family: var(--font);
            background: var(--page);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 34px; height: 34px;
            background: var(--blue);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.1rem; color: #fff;
        }
        .logo-text { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.3px; }
        .logo-text span { color: var(--blue); }
        .header-badge {
            font-size: 0.7rem; color: var(--text-muted);
            background: var(--blue-soft); padding: 5px 12px;
            border-radius: 20px; border: 1px solid var(--blue-border);
        }

        /* Main */
        .main { flex: 1; width: 100%; max-width: 1100px; margin: 0 auto; padding: 24px; }

        .tagline { text-align: center; margin-bottom: 20px; }
        .tagline h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.4px; }
        .tagline p { color: var(--text-muted); font-size: 0.92rem; margin-top: 4px; }

        /* Controls */
        .controls {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px 18px;
            margin-bottom: 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 22px 28px;
        }

        /* Direction segmented switch */
        .seg { display: inline-flex; background: var(--page); border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
        .seg button {
            border: none; background: transparent; cursor: pointer;
            font-family: var(--font); font-size: 0.8rem; font-weight: 600;
            color: var(--text-muted); padding: 7px 14px; border-radius: 999px;
            transition: all 0.15s; white-space: nowrap;
        }
        .seg button.active { background: var(--blue); color: #fff; }

        .ctrl { display: flex; flex-direction: column; gap: 6px; min-width: 190px; }
        .ctrl-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); display: flex; justify-content: space-between; gap: 10px; }
        .ctrl-label .val { color: var(--blue); font-weight: 700; text-transform: none; letter-spacing: 0; }

        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 6px; border-radius: 999px;
            background: var(--blue-soft); outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--blue); border: 2px solid #fff; box-shadow: 0 1px 4px rgba(10,102,194,0.4);
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--blue); border: 2px solid #fff;
        }

        .toggles { display: flex; gap: 18px; }
        .switch { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); user-select: none; }
        .switch input { display: none; }
        .switch .track { width: 38px; height: 22px; border-radius: 999px; background: #cdd7e1; position: relative; transition: background 0.15s; flex-shrink: 0; }
        .switch .track::after { content: ""; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform 0.15s; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .switch input:checked + .track { background: var(--blue); }
        .switch input:checked + .track::after { transform: translateX(16px); }
        .switch.disabled { opacity: 0.4; pointer-events: none; }

        /* Panes */
        .panes { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .pane {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow);
            display: flex; flex-direction: column; min-height: 320px;
        }
        .pane-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted);
        }
        .pane-head .out-actions { display: flex; gap: 6px; }
        .icon-btn {
            border: 1px solid var(--border); background: var(--card);
            color: var(--text-muted); border-radius: var(--radius-sm);
            font-family: var(--font); font-size: 0.72rem; font-weight: 600;
            padding: 5px 10px; cursor: pointer; transition: all 0.15s;
            text-transform: none; letter-spacing: 0; display: inline-flex; align-items: center; gap: 5px;
        }
        .icon-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); background: var(--blue-soft); }
        .icon-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        textarea#input {
            flex: 1; width: 100%; border: none; outline: none; resize: none;
            padding: 16px; font-family: var(--font); font-size: 0.95rem; line-height: 1.6;
            color: var(--text); background: transparent;
        }
        textarea#input::placeholder { color: var(--text-dim); }

        .output {
            flex: 1; padding: 16px; font-size: 0.95rem; line-height: 1.7;
            white-space: pre-wrap; word-wrap: break-word; overflow-y: auto;
        }
        .output.placeholder { color: var(--text-dim); display: flex; align-items: center; justify-content: center; text-align: center; }

        .error-msg {
            background: rgba(192, 57, 43, 0.08); border: 1px solid rgba(192, 57, 43, 0.25);
            border-radius: var(--radius-sm); padding: 12px 14px; color: var(--red); font-size: 0.88rem;
        }

        /* Typing dots */
        .typing { display: inline-flex; gap: 5px; align-items: center; }
        .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); animation: blink 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,60%,100% { opacity: 0.2; } 30% { opacity: 1; } }

        /* Action row */
        .actions { display: flex; align-items: center; gap: 12px; margin-top: 18px; }
        .btn-primary {
            background: var(--blue); color: #fff; border: none; border-radius: var(--radius-sm);
            font-family: var(--font); font-size: 0.95rem; font-weight: 700;
            padding: 13px 28px; cursor: pointer; transition: background 0.15s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary:hover:not(:disabled) { background: var(--blue-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-nuclear {
            border: 1.5px solid #d6453c; background: #fff; color: #c0392b;
            border-radius: var(--radius-sm); font-family: var(--font);
            font-size: 0.9rem; font-weight: 700; padding: 12px 18px; cursor: pointer;
            transition: all 0.15s; display: inline-flex; align-items: center; gap: 7px;
        }
        .btn-nuclear:hover { background: #fdeceb; }
        .btn-nuclear.active {
            background: #c0392b; color: #fff; border-color: #c0392b;
            animation: nukePulse 1.5s infinite;
        }
        @keyframes nukePulse {
            0% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(192, 57, 43, 0); }
            100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0); }
        }
        .ctrl.disabled { opacity: 0.4; pointer-events: none; }

        .examples-label { font-size: 0.72rem; color: var(--text-dim); font-weight: 600; }

        /* Examples */
        .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
        .example-btn {
            background: var(--card); border: 1px solid var(--border); border-radius: 999px;
            padding: 7px 14px; color: var(--text-muted); font-size: 0.8rem; cursor: pointer;
            font-family: var(--font); transition: all 0.15s;
        }
        .example-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-soft); }

        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--text); color: #fff; padding: 10px 18px; border-radius: 999px;
            font-size: 0.85rem; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 50;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 720px) {
            .panes { grid-template-columns: 1fr; }
            .controls { gap: 16px 20px; }
            .ctrl { min-width: 150px; flex: 1; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">in</div>
            <div class="logo-text">LinkedIn<span>-ify</span></div>
        </div>
        <div class="header-badge">Powered by Cloudflare Workers AI</div>
    </header>

    <div class="main">
        <div class="tagline">
            <h1>English → LinkedIn-Speak Translator</h1>
            <p id="subtitle">Turn a plain sentence into an unbearably inspiring LinkedIn post.</p>
        </div>

        <div class="controls">
            <div class="seg" id="direction">
                <button data-dir="to_linkedin" class="active">English → LinkedIn</button>
                <button data-dir="to_english">LinkedIn → English</button>
            </div>

            <div class="ctrl">
                <div class="ctrl-label"><span id="buzzName">Buzzwords</span><span class="val" id="buzzVal">Influencer</span></div>
                <input type="range" id="buzzword" min="1" max="4" step="1" value="3">
            </div>

            <div class="ctrl" id="exagCtrl">
                <div class="ctrl-label"><span id="exagName">Exaggeration</span><span class="val" id="exagVal">Embellished</span></div>
                <input type="range" id="exaggeration" min="1" max="4" step="1" value="2">
            </div>

            <div class="toggles" id="toggleWrap">
                <label class="switch"><input type="checkbox" id="hashtags" checked><span class="track"></span>Hashtags</label>
                <label class="switch"><input type="checkbox" id="emoji" checked><span class="track"></span>Emoji</label>
            </div>
        </div>

        <div class="panes">
            <div class="pane">
                <div class="pane-head"><span id="inLabel">Plain English</span></div>
                <textarea id="input" placeholder="e.g. i got promoted to senior engineer" autofocus></textarea>
            </div>
            <div class="pane">
                <div class="pane-head">
                    <span id="outLabel">LinkedIn Post</span>
                    <div class="out-actions">
                        <button class="icon-btn" id="copyBtn" disabled>Copy</button>
                        <button class="icon-btn" id="regenBtn" disabled>Regenerate</button>
                    </div>
                </div>
                <div class="output placeholder" id="output">Your LinkedIn masterpiece will appear here.</div>
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" id="sendBtn">Translate →</button>
            <button class="btn-nuclear" id="nukeBtn" title="Maximum maximum exaggeration — fixing a lightswitch saved the world">☢️ Nuclear Mode</button>
            <span class="examples-label">or try an example:</span>
        </div>
        <div class="examples" id="examples"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const BUZZ_LABELS = { 1: "Subtle", 2: "Professional", 3: "Influencer", 4: "Maximum cringe" };
        const EXAG_LABELS = { 1: "Honest", 2: "Embellished", 3: "Heroic", 4: "Saved the company" };
        const BLUNT_LABELS = { 1: "Gentle", 2: "Honest", 3: "Harsh", 4: "Brutal" };
        const CYNIC_LABELS = { 1: "Light", 2: "Skeptical", 3: "Snarky", 4: "Savage" };

        const EXAMPLES = {
            to_linkedin: [
                "i got promoted to senior engineer",
                "we shipped a small feature today",
                "i'm looking for a new job",
                "i had coffee with a coworker",
                "i fixed a bug",
            ],
            to_english: [
                "Humbled and honored to share that after an incredible journey of growth, I've decided to embark on a new chapter. 🙏 Grateful for every lesson. #blessed #newbeginnings #grateful",
                "I woke up at 4am. While the world slept, I was grinding. Success isn't given, it's earned. Who else is up? 💪 #riseandgrind #nodaysoff",
                "A stranger paid for my coffee today. It reminded me that leadership is about lifting others up. Always be the reason someone believes in good. Agree? ☕",
            ],
        };

        const $ = (id) => document.getElementById(id);
        const input = $("input"), output = $("output"), sendBtn = $("sendBtn");
        const copyBtn = $("copyBtn"), regenBtn = $("regenBtn");
        const buzzword = $("buzzword"), exaggeration = $("exaggeration");
        const hashtags = $("hashtags"), emoji = $("emoji");
        const toggleWrap = $("toggleWrap"), examplesEl = $("examples");
        const nukeBtn = $("nukeBtn"), exagCtrl = $("exagCtrl");

        let direction = "to_linkedin";
        let isStreaming = false;
        let lastPayload = null;
        let fullText = "";
        let nuclear = false;

        // Auto-resize input
        input.addEventListener("input", () => {
            input.style.height = "auto";
            input.style.height = Math.max(input.scrollHeight, 200) + "px";
        });

        // Sliders
        function updateSliderLabels() {
            const b = +buzzword.value, e = +exaggeration.value;
            if (direction === "to_linkedin") {
                $("buzzName").textContent = "Buzzwords";
                $("buzzVal").textContent = nuclear ? "☢️ MAX" : BUZZ_LABELS[b];
                $("exagVal").textContent = nuclear ? "☢️ MAXIMUM" : EXAG_LABELS[e];
            } else {
                $("buzzName").textContent = "Cynicism";
                $("buzzVal").textContent = CYNIC_LABELS[b];
                $("exagVal").textContent = BLUNT_LABELS[e];
            }
        }
        buzzword.addEventListener("input", updateSliderLabels);
        exaggeration.addEventListener("input", updateSliderLabels);

        // Nuclear mode: overrides the exaggeration slider entirely
        function setNuclear(on) {
            nuclear = on && direction === "to_linkedin";
            nukeBtn.classList.toggle("active", nuclear);
            nukeBtn.textContent = nuclear ? "☢️ NUCLEAR: ON" : "☢️ Nuclear Mode";
            sendBtn.textContent = nuclear ? "☢️ Translate →" : "Translate →";
            exagCtrl.classList.toggle("disabled", nuclear);
            updateSliderLabels();
        }
        nukeBtn.addEventListener("click", () => setNuclear(!nuclear));

        // Direction switch
        $("direction").addEventListener("click", (ev) => {
            const btn = ev.target.closest("button");
            if (!btn) return;
            direction = btn.dataset.dir;
            document.querySelectorAll("#direction button").forEach((b) => b.classList.toggle("active", b === btn));
            const toLi = direction === "to_linkedin";
            $("inLabel").textContent = toLi ? "Plain English" : "LinkedIn Post";
            $("outLabel").textContent = toLi ? "LinkedIn Post" : "Plain English";
            $("subtitle").textContent = toLi
                ? "Turn a plain sentence into an unbearably inspiring LinkedIn post."
                : "Decode a LinkedIn post into what they actually meant.";
            $("input").placeholder = toLi ? "e.g. i got promoted to senior engineer" : "Paste a cringey LinkedIn post...";
            // Hashtag/emoji toggles only apply when generating LinkedIn-speak
            toggleWrap.querySelectorAll(".switch").forEach((s) => s.classList.toggle("disabled", !toLi));
            $("exagName").textContent = toLi ? "Exaggeration" : "Bluntness";
            // Nuclear mode only makes sense when generating LinkedIn-speak
            nukeBtn.style.display = toLi ? "inline-flex" : "none";
            setNuclear(false); // also calls updateSliderLabels()
            renderExamples();
            resetOutput();
        });

        // Examples
        function renderExamples() {
            examplesEl.innerHTML = "";
            EXAMPLES[direction].forEach((text) => {
                const b = document.createElement("button");
                b.className = "example-btn";
                b.textContent = text.length > 48 ? text.slice(0, 46) + "…" : text;
                b.title = text;
                b.onclick = () => { input.value = text; input.dispatchEvent(new Event("input")); translate(); };
                examplesEl.appendChild(b);
            });
        }

        function resetOutput() {
            output.className = "output placeholder";
            output.textContent = direction === "to_linkedin"
                ? "Your LinkedIn masterpiece will appear here."
                : "The honest translation will appear here.";
            copyBtn.disabled = true;
            regenBtn.disabled = true;
            fullText = "";
        }

        function showToast(msg) {
            const t = $("toast");
            t.textContent = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 1600);
        }

        function buildPayload() {
            return {
                text: input.value.trim(),
                direction,
                buzzword: +buzzword.value,
                exaggeration: +exaggeration.value,
                hashtags: hashtags.checked,
                emoji: emoji.checked,
                nuclear,
            };
        }

        async function translate(payload) {
            const data = payload || buildPayload();
            if (!data.text || isStreaming) return;
            lastPayload = data;

            isStreaming = true;
            sendBtn.disabled = true;
            copyBtn.disabled = true;
            regenBtn.disabled = true;
            fullText = "";
            output.className = "output";
            output.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

            try {
                const res = await fetch("/api/translate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data),
                });

                if (!res.ok) {
                    let msg = "Request failed (" + res.status + ")";
                    try { const j = await res.json(); if (j.error) msg = j.error; } catch {}
                    throw new Error(msg);
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";
                let firstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed.startsWith("data:")) continue;
                        const payloadStr = trimmed.slice(5).trim();
                        if (payloadStr === "[DONE]" || payloadStr === "") continue;
                        try {
                            const obj = JSON.parse(payloadStr);
                            const token = obj.response ?? "";
                            if (token) {
                                if (firstChunk) { output.textContent = ""; firstChunk = false; }
                                fullText += token;
                                output.textContent = fullText;
                                output.scrollTop = output.scrollHeight;
                            }
                        } catch {}
                    }
                }

                if (!fullText.trim()) {
                    output.className = "output placeholder";
                    output.textContent = "(no output — try again)";
                } else {
                    copyBtn.disabled = false;
                    regenBtn.disabled = false;
                }
            } catch (err) {
                output.className = "output";
                output.innerHTML = '<div class="error-msg"></div>';
                output.querySelector(".error-msg").textContent = err.message || String(err);
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener("click", () => translate());
        regenBtn.addEventListener("click", () => { if (lastPayload) translate(lastPayload); });

        copyBtn.addEventListener("click", async () => {
            if (!fullText) return;
            try { await navigator.clipboard.writeText(fullText); showToast("Copied to clipboard"); }
            catch { showToast("Copy failed"); }
        });

        // Ctrl/Cmd+Enter to translate
        input.addEventListener("keydown", (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); translate(); }
        });

        updateSliderLabels();
        renderExamples();
    </script>
</body>
</html>
